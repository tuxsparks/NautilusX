<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>NautilusX</title>
<link rel="icon" href="https://nautilusx.playit.plus:36703/">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: black;
    font-family: Arial, sans-serif;
}

#frame {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
}

#fallback {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    background: #111;
    color: white;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 32px;
}
</style>
</head>

<body>

<div id="fallback">
    Sorry, NautilusX is down.<br>
    Try again later.
</div>

<iframe
    id="frame"
    src="https://nautilusx.playit.plus:36703/"
    onerror="showFallback()">
</iframe>

<script>
function showFallback(){
    document.getElementById("frame").style.display = "none";
    document.getElementById("fallback").style.display = "flex";
}
</script>

</body>
</html>
