<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NautilusX</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">NautilusX</div>
      <div class="actions">
        <a id="openExternal" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open in New Tab</a>
      </div>
    </header>

    <main class="embed-shell">
      <div id="status" class="status"></div>
      <iframe id="siteFrame" title="NautilusX Embedded Site" loading="eager" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </main>

    <script src="app.js"></script>
  </body>
</html>
